name: Janten
options:
  bundleIdPrefix: com.gzy
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 4U65SMBZNX
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_NSCameraUsageDescription: 用于拍摄麻将牌面进行识别算点
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 用于从相册选择牌面照片进行识别
targets:
  Janten:
    type: application
    platform: iOS
    sources:
      - path: Janten/Sources
      - path: Janten/Resources/TileDetector.mlpackage
        type: folder
        buildPhase: resources
      - path: Janten/Resources/engine.bundle.js
        buildPhase: resources
      - path: Janten/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gzy.janten
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
